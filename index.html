<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiviApp</title>
  <meta name="description" content="App cliente de HiviApp.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-demo">
    <div class="view-switcher" aria-label="Selector de vista">
      <button class="view-switch-btn is-active" type="button" data-view-mode="mobile">Movil</button>
      <button class="view-switch-btn" type="button" data-view-mode="tablet">Tablet</button>
      <button class="view-switch-btn" type="button" data-view-mode="web">Web</button>
    </div>

    <section class="device-zone">
      <div class="phone">
        <div class="phone-top">
          <div class="phone-notch"></div>
        </div>

        <div class="phone-body is-logged-out" id="phone-body">
          <div class="mobile-statusbar">
            <span>9:41</span>
            <span>HiviApp</span>
            <span>LTE 100%</span>
          </div>

          <header class="mobile-appbar">
            <div>
              <p class="mobile-appbar-kicker" id="appbar-kicker">Hivimar Peru</p>
              <strong id="appbar-title">Inicio</strong>
            </div>
            <div class="appbar-actions">
              <button class="mobile-menu-trigger" id="appbar-action" type="button">Soporte</button>
            </div>
          </header>

          <button class="web-nav-toggle" id="web-nav-toggle" type="button" aria-expanded="true" aria-label="Ocultar menu" title="Ocultar menu">
            <span class="web-nav-toggle-icon" aria-hidden="true"></span>
          </button>

          <div class="mobile-banner" id="mobile-banner">
            <strong>Todo tu soporte tecnico-comercial en un solo lugar</strong>
            <span>Consulta, compara, calcula y solicita cuando lo necesites.</span>
          </div>

          <div class="screen-viewport" id="screen-viewport"></div>

          <nav class="bottom-nav" id="bottom-nav" aria-label="Navegacion principal de la app"></nav>

          <div id="more-sheet-root"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/core/data.js"></script>
  <script src="./js/core/state.js"></script>
  <script src="./js/templates/base.js"></script>
  <script src="./js/templates/screens/login.js"></script>
  <script src="./js/templates/screens/home.js"></script>
  <script src="./js/templates/screens/line.js"></script>
  <script src="./js/templates/screens/tools.js"></script>
  <script src="./js/templates/screens/requests.js"></script>
  <script src="./js/templates/screens/request.js"></script>
  <script src="./js/templates/screens/done.js"></script>
  <script src="./js/templates/screens/profile.js"></script>
  <script src="./js/templates/screens/unit-converter.js"></script>
  <script src="./js/templates/screens/calculators.js"></script>
  <script src="./js/templates/screens/formulas.js"></script>
  <script src="./js/templates/screens/troubleshooting.js"></script>
  <script src="./js/templates/screens/checklist.js"></script>
  <script src="./js/templates/screens/brochures.js"></script>
  <script src="./js/templates/screens/expert-consult.js"></script>
  <script src="./js/templates/layout/nav.js"></script>
  <script src="./js/templates/layout/more-sheet.js"></script>
  <script src="./js/templates/render.js"></script>
  <script src="./js/core/dom.js"></script>
  <script src="./js/core/ui.js"></script>
  <script src="./js/core/auth.js"></script>
  <script src="./js/features/line.js"></script>
  <script src="./js/features/request-form.js"></script>
  <script src="./js/features/home.js"></script>
  <script src="./js/features/options.js"></script>
  <script src="./js/features/requests.js"></script>
  <script src="./js/features/unit-converter.js"></script>
  <script src="./js/features/calculators.js"></script>
  <script src="./js/features/formulas.js"></script>
  <script src="./js/features/troubleshooting.js"></script>
  <script src="./js/features/checklist.js"></script>
  <script src="./js/features/brochures.js"></script>
  <script src="./js/features/expert-consult.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
